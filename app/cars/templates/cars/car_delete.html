{% extends 'base.html' %}

{% block content %}

<div style="
    max-width:520px;
    margin:80px auto;
    background:white;
    border:1px solid #e5e7eb;
    border-radius:14px;
    padding:28px;
">

    <h1 style="
        margin:0 0 12px 0;
        font-size:26px;
        color:#111827;
    ">
        Excluir carro
    </h1>

    <p style="
        color:#667085;
        font-size:16px;
        margin-bottom:28px;
        line-height:1.5;
    ">
        Tem certeza que deseja excluir o veículo
        <strong>{{ car.brand }} {{ car.model }}</strong>
        de placa
        <strong>{{ car.plate }}</strong>?
    </p>

    <form method="post">
        {% csrf_token %}

        <div style="
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:12px;
        ">
            <button type="submit" style="
                height:38px;
                background:#dc2626;
                color:white;
                border:none;
                border-radius:8px;
                font-size:15px;
                cursor:pointer;
            ">
                Sim, excluir
            </button>

            <a href="{% url 'cars_list' %}" style="
                height:38px;
                border:1px solid #e5e7eb;
                border-radius:8px;
                color:#111827;
                text-decoration:none;
                display:flex;
                align-items:center;
                justify-content:center;
                font-size:15px;
                background:white;
            ">
                Cancelar
            </a>
        </div>
    </form>

</div>

{% endblock %}
